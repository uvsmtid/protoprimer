# Only `.readthedocs.yaml` basename is allowed.
# See:
# https://app.readthedocs.org/dashboard/protoprimer/edit/

version: "2"

build:
    os: "ubuntu-22.04"
    tools:
        python: "3.10"

python:
    install:
        -   method: pip
            path: src/local_doc

sphinx:
    configuration: doc/readthedocs/source/conf.py

    # Options:
    # * `html` = multiple pages
    # * `singlehtml` = single page
    builder: html
